name: Weekly Auto Sale

on:
  # 毎週月曜 深夜1時（日本時間）に自動実行
  # UTC 16:00 (日曜) = JST 01:00 (月曜)
  schedule:
    - cron: '0 16 * * 0'

  # 手動実行も可能（テスト用）
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'start_sale'
        type: choice
        options:
          - start_sale
          - restore_only

jobs:
  auto-sale:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python環境をセットアップ
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Playwrightをインストール
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      # 4. セールスクリプトを実行
      - name: Run sale script
        env:
          WAKUST_EMAIL: ${{ secrets.WAKUST_EMAIL }}
          WAKUST_PASSWORD: ${{ secrets.WAKUST_PASSWORD }}
        run: |
          python sale_auto.py ${{ github.event.inputs.mode || 'start_sale' }}

      # 5. 状態ファイル・履歴・ログをコミットして保存
      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sale_state.json sale_history.json sale_result.json sale_log.txt
          git diff --staged --quiet || git commit -m "🏷️ Auto sale update $(date '+%Y-%m-%d %H:%M')"
          git push
